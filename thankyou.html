<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תודה – FertiYou</title>
  <link rel="stylesheet" href="https://use.typekit.net/jzn7stu.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="site-header__inner">
      <a href="index.html" class="header-logo" aria-label="FertiYou – עמוד הבית">
        <img src="images/asset-9-300x-2-87.png" alt="" class="header-logo__leaf" aria-hidden="true" />
        <img src="images/asset-10-300x-1-88.png" alt="FertiYou" class="header-logo__text" />
      </a>
      <nav class="nav" aria-label="ניווט ראשי">
        <a href="index.html#contact" class="nav-link">צרו קשר</a>
        <a href="index.html#about" class="nav-link">אודות</a>
      </nav>
    </div>
  </header>

  <!-- ===== THANK YOU SECTION ===== -->
  <main>
    <section class="thankyou" aria-label="תודה על פנייתך">

      <!-- Small leaf icon: Figma left=510, top=154 → 47.22%, 18.94% -->
      <img
        src="images/thankyou-leaf.png"
        alt=""
        class="thankyou__leaf"
        aria-hidden="true"
      />

      <!-- Centered message text -->
      <div class="thankyou__text">
        <p>תודה על פנייתך</p>
        <p>מתרגשות לצאת איתך לדרך ♡</p>
        <p>נצור קשר בהקדם</p>
      </div>

      <!-- FertiYou wordmark: Figma left=419, top=567 → 38.79%, 69.74% -->
      <img
        src="images/thankyou-wordmark.png"
        alt="Fertiyou."
        class="thankyou__wordmark"
        aria-hidden="true"
      />

    </section>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="site-footer__inner">
      <a href="index.html" class="footer-logo" aria-label="FertiYou – עמוד הבית">
        <img src="images/asset-9-300x-2-87.png" alt="" class="footer-logo__leaf" aria-hidden="true">
        <img src="images/asset-10-300x-1-88.png" alt="FertiYou" class="footer-logo__text">
      </a>
      <nav class="footer-links" aria-label="קישורים בתחתית הדף">
        <a href="privacy.html" class="footer-link">מדיניות פרטיות</a>
      </nav>
      <p class="footer-copy">© 2026</p>
    </div>
  </footer>

</body>
</html>
